<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GraphMind Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body class="min-h-screen bg-[#f7f7f8] text-[#202123]">
    <div class="flex h-screen overflow-hidden">
      <aside class="hidden w-72 shrink-0 border-r border-zinc-200 bg-white lg:flex lg:flex-col">
        <div class="border-b border-zinc-200 px-4 py-4">
          <div class="text-base font-semibold">GraphMind</div>
          <div id="status" class="mt-1 text-xs text-zinc-500">Connecting...</div>
        </div>

        <section class="border-b border-zinc-200 p-4">
          <div class="flex items-center justify-between text-xs text-zinc-500">
            <span>Context</span>
            <span id="contextLabel">0 / 0</span>
          </div>
          <div class="mt-2 h-2 overflow-hidden rounded-full bg-zinc-100">
            <div id="contextBar" class="h-full w-0 rounded-full bg-emerald-500 transition-all"></div>
          </div>
        </section>

        <section class="min-h-0 flex-1 overflow-y-auto p-3">
          <div class="mb-2 px-2 text-xs font-medium uppercase tracking-wide text-zinc-400">Rounds</div>
          <nav id="turnsNav" class="space-y-1"></nav>
        </section>

        <div class="border-t border-zinc-200 p-3">
          <button
            id="clearBtn"
            class="w-full rounded-lg px-3 py-2 text-left text-sm text-zinc-600 hover:bg-zinc-100"
            type="button"
          >
            Clear conversation
          </button>
        </div>
      </aside>

      <main class="flex min-w-0 flex-1 flex-col">
        <header class="flex h-14 items-center justify-between border-b border-zinc-200 bg-white px-4 lg:hidden">
          <div>
            <div class="font-semibold">GraphMind</div>
            <div id="mobileStatus" class="text-xs text-zinc-500">Connecting...</div>
            <div id="mobileContextLabel" class="text-xs text-zinc-400">0 / 0 tokens</div>
          </div>
          <button id="mobileClearBtn" class="rounded-md px-3 py-2 text-sm text-zinc-600 hover:bg-zinc-100" type="button">
            Clear
          </button>
        </header>

        <section id="chatScroll" class="min-h-0 flex-1 overflow-y-auto">
          <div id="conversation" class="mx-auto flex max-w-3xl flex-col gap-8 px-4 py-8"></div>
        </section>

        <section id="confirmPanel" class="hidden border-t border-amber-200 bg-amber-50 px-4 py-3">
          <div class="mx-auto max-w-3xl">
            <div class="text-sm font-semibold text-amber-900">Human confirmation required</div>
            <div id="confirmCalls" class="mt-3 space-y-2"></div>
            <div class="mt-3 flex justify-end gap-2">
              <button id="denyBtn" class="rounded-lg border border-amber-300 bg-white px-4 py-2 text-sm text-amber-900 hover:bg-amber-100" type="button">
                Deny
              </button>
              <button id="allowBtn" class="rounded-lg bg-amber-500 px-4 py-2 text-sm font-medium text-white hover:bg-amber-600" type="button">
                Allow
              </button>
            </div>
          </div>
        </section>

        <form id="taskForm" class="border-t border-zinc-200 bg-white px-4 py-4">
          <div class="composer mx-auto max-w-3xl rounded-2xl border border-zinc-300 bg-white shadow-sm focus-within:border-zinc-400">
            <textarea
              id="taskInput"
              class="max-h-48 min-h-12 w-full resize-none border-0 bg-transparent py-3 pl-4 pr-14 text-[15px] leading-6 text-zinc-900 outline-none placeholder:text-zinc-400"
              placeholder="Message GraphMind..."
            >{{ default_task }}</textarea>
            <button
              id="runBtn"
              class="composer-button flex h-9 w-9 shrink-0 items-center justify-center rounded-full bg-zinc-900 text-white hover:bg-zinc-700 disabled:cursor-not-allowed disabled:bg-zinc-300"
              type="submit"
              aria-label="Send"
            >
              ↑
            </button>
          </div>
          <p class="mx-auto mt-2 max-w-3xl text-center text-xs text-zinc-400">
            File-related tool calls pause for approval before execution.
          </p>
        </form>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.7/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@16.4.1/marked.min.js"></script>
    <script src="/static/js/agent.js"></script>
  </body>
</html>
