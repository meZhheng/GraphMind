<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GraphMind Agent</title>
    <link rel="stylesheet" href="/static/dist/app.css" />
    <link rel="stylesheet" href="/static/css/rounds.css" />
  </head>
  <body class="min-h-screen bg-[#f7f7f8] text-[#202123] antialiased">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="brand">GraphMind</div>
          <div id="status" class="status">Connecting...</div>
          <button id="newSessionBtn" class="new-session-button" type="button">
            <span aria-hidden="true">+</span>
            New session
          </button>
        </div>

        <section class="context-card">
          <div class="context-row">
            <span>Context</span>
            <span id="contextLabel">0 / 0</span>
          </div>
          <div class="context-track">
            <div id="contextBar" class="context-bar"></div>
          </div>
        </section>

        <section class="sessions-panel">
          <div class="panel-label">History sessions</div>
          <nav id="sessionsNav" class="sessions-nav"></nav>
        </section>

        <div class="sidebar-footer">
          <button id="clearBtn" class="ghost-button" type="button">
            Clear conversation
          </button>
        </div>
      </aside>

      <main class="main-pane">
        <header class="mobile-header">
          <div>
            <div class="brand">GraphMind</div>
            <div id="mobileStatus" class="status">Connecting...</div>
            <div id="mobileContextLabel" class="mobile-context">0 / 0 tokens</div>
          </div>
          <div class="mobile-actions">
            <button id="mobileNewSessionBtn" class="mobile-clear" type="button">
              New
            </button>
            <button id="mobileClearBtn" class="mobile-clear" type="button">
              Clear
            </button>
          </div>
        </header>

        <section id="chatScroll" class="chat-scroll">
          <div id="conversation" class="conversation"></div>
        </section>

        <section id="confirmPanel" class="confirm-panel hidden">
          <div class="confirm-inner">
            <div class="confirm-title">Human confirmation required</div>
            <div id="confirmCalls" class="confirm-calls"></div>
            <div class="confirm-actions">
              <button
                id="confirmSubmitBtn"
                class="allow-button"
                type="button"
                disabled
              >
                Submit decisions
              </button>
            </div>
          </div>
        </section>

        <form id="taskForm" class="composer-area">
          <div class="composer">
            <textarea
              id="taskInput"
              class="composer-input"
              placeholder="Message GraphMind..."
            >{{ default_task }}</textarea>
            <button
              id="runBtn"
              class="composer-button"
              type="submit"
              aria-label="Send"
            >
              ↑
            </button>
          </div>
          <p class="composer-help">
            File-related tool calls pause for approval before execution.
          </p>
        </form>
      </main>

      {% include "partials/rounds.html" %}
    </div>

    <script src="/static/js/rounds.js"></script>
    <script src="/static/js/agent.js"></script>
  </body>
</html>
