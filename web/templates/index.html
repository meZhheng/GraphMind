<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GraphMind Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/static/css/app.css" />
  </head>
  <body class="min-h-screen bg-zinc-950 text-zinc-100">
    <main class="mx-auto flex min-h-screen max-w-7xl flex-col gap-4 px-4 py-4 lg:px-6">
      <header class="flex items-center justify-between border-b border-zinc-800 pb-3">
        <div>
          <h1 class="text-xl font-semibold tracking-normal">GraphMind Agent</h1>
          <p id="status" class="mt-1 text-sm text-zinc-400">Connecting...</p>
        </div>
        <button
          id="clearBtn"
          class="rounded-md border border-zinc-700 px-3 py-2 text-sm text-zinc-200 hover:bg-zinc-900"
          type="button"
        >
          Clear
        </button>
      </header>

      <section class="grid min-h-0 flex-1 gap-4 lg:grid-cols-[minmax(0,1fr)_360px]">
        <div class="flex min-h-[60vh] flex-col overflow-hidden rounded-lg border border-zinc-800 bg-zinc-950">
          <div id="events" class="flex-1 space-y-3 overflow-y-auto p-4"></div>
        </div>

        <aside class="flex flex-col gap-4">
          <form id="taskForm" class="rounded-lg border border-zinc-800 bg-zinc-950 p-4">
            <label for="taskInput" class="block text-sm font-medium text-zinc-200">Task</label>
            <textarea
              id="taskInput"
              class="mt-2 min-h-40 w-full resize-y rounded-md border border-zinc-700 bg-zinc-900 px-3 py-2 text-sm text-zinc-100 outline-none focus:border-emerald-500"
            >{{ default_task }}</textarea>
            <button
              id="runBtn"
              class="mt-3 w-full rounded-md bg-emerald-500 px-4 py-2 text-sm font-medium text-zinc-950 hover:bg-emerald-400 disabled:cursor-not-allowed disabled:opacity-50"
              type="submit"
            >
              Run Agent
            </button>
          </form>

          <section id="confirmPanel" class="hidden rounded-lg border border-amber-500/40 bg-amber-500/10 p-4">
            <h2 class="text-sm font-semibold text-amber-200">Human confirmation</h2>
            <div id="confirmCalls" class="mt-3 space-y-3"></div>
            <div class="mt-4 grid grid-cols-2 gap-2">
              <button
                id="denyBtn"
                class="rounded-md border border-zinc-700 px-3 py-2 text-sm text-zinc-200 hover:bg-zinc-900"
                type="button"
              >
                Deny
              </button>
              <button
                id="allowBtn"
                class="rounded-md bg-amber-400 px-3 py-2 text-sm font-medium text-zinc-950 hover:bg-amber-300"
                type="button"
              >
                Allow
              </button>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <script src="/static/js/agent.js"></script>
  </body>
</html>
